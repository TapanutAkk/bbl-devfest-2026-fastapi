<section>
  <h2>Items</h2>
  <form hx-post="/items" hx-target="#item-list" hx-swap="outerHTML"
        hx-on::after-request="if (event.detail.successful) this.reset()">
    <input type="text" name="name" placeholder="ชื่อ item..." required>
    <input type="text" name="description" placeholder="คำอธิบาย (ไม่บังคับ)">
    <button type="submit">เพิ่ม</button>
  </form>
  {% include "partials/item_list.html" %}
</section>
