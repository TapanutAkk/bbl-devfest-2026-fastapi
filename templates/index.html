<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>

<body>
  <main class="card">
    <h1>{{ title }} Jack</h1>
    <p>FastAPI + Jinja2 + HTMX พร้อมใช้งานแล้ว 🎉</p>

    <nav>
      <a href="/" hx-get="/" hx-target="#content" hx-push-url="true"
        class="{{ 'active' if page == 'echo' else '' }}">Echo</a>
      <a href="/items" hx-get="/items" hx-target="#content" hx-push-url="true"
        class="{{ 'active' if page == 'items' else '' }}">Items</a>
    </nav>

    <div id="content">
      {% include "partials/" ~ page ~ ".html" %}
    </div>

    <footer>
      <a href="/docs" target="_blank">เปิด API Docs (Swagger UI)</a>
    </footer>
  </main>

  <script>
    function syncNav() {
      document.querySelectorAll("nav a").forEach((a) => {
        a.classList.toggle("active", a.getAttribute("href") === location.pathname);
      });
    }
    ["htmx:pushedIntoHistory", "htmx:historyRestore", "popstate"].forEach((ev) =>
      window.addEventListener(ev, syncNav)
    );
  </script>
</body>

</html>
