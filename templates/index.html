<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>

<body>
  <main class="card">
    <h1>{{ title }}</h1>
    <p>FastAPI + Jinja2 + HTMX พร้อมใช้งานแล้ว 🎉</p>

    {% if user %}
    <nav>
      <button class="nav-logout" hx-post="/logout" hx-confirm="ออกจากระบบ?">ออกจากระบบ ({{ user.username }})</button>
    </nav>
    {% endif %}

    <div id="content">
      {% include "partials/" ~ page ~ ".html" %}
    </div>

    <footer>
      <a href="/docs" target="_blank">เปิด API Docs (Swagger UI)</a>
    </footer>
  </main>

  <script src="/static/main.js"></script>
</body>

</html>
